<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIKO | Premium Toy Artistry</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        anton: ['Anton', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style type="text/css">
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .grain-overlay {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
            pointer-events: none;
            position: absolute;
            inset: 0;
            z-index: 50;
            opacity: 0.35;
        }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        const IMAGES = [
            { 
                src: 'https://github.com/zr16112871-pixel/0524/blob/main/uu%201.png?raw=true', 
                bg: '#2B1B22', 
                panel: '#412A34' 
            }, // Item 1 (uu): Premium Dark Berry
            { 
                src: 'https://github.com/zr16112871-pixel/0524/blob/main/%E4%B8%AB%E4%B8%AB%201.png?raw=true', 
                bg: '#16191C', 
                panel: '#22272B' 
            }, // Item 2 (丫丫): Tech Matte Charcoal Black
            { 
                src: 'https://github.com/zr16112871-pixel/0524/blob/main/%E5%93%87%E5%93%87%201.png?raw=true', 
                bg: '#1D2120', 
                panel: '#2B3130' 
            }, // Item 3 (哇哇): Deep Obsidian / Titanium
            { 
                src: 'https://github.com/zr16112871-pixel/0524/blob/main/%E6%8B%89%E6%8B%89%201.png?raw=true', 
                bg: '#1F1A2B', 
                panel: '#2F2740' 
            }, // Item 4 (拉拉): Mystic Cyber Violet
        ];

        // 简易 Icon 组件，避免引入额外的 Lucide UMD 复杂度
        const ArrowLeftIcon = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        );

        const ArrowRightIcon = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        );

        const App = () => {
            const [activeIndex, setActiveIndex] = useState(0);
            const [isAnimating, setIsAnimating] = useState(false);
            const [isMobile, setIsMobile] = useState(false);

            useEffect(() => {
                // 预加载图片
                IMAGES.forEach((item) => {
                    const img = new Image();
                    img.src = item.src;
                });

                const checkMobile = () => {
                    setIsMobile(window.innerWidth < 640);
                };

                checkMobile();
                window.addEventListener('resize', checkMobile);
                return () => window.removeEventListener('resize', checkMobile);
            }, []);

            const navigate = useCallback((direction) => {
                if (isAnimating) return;

                setIsAnimating(true);
                if (direction === 'next') {
                    setActiveIndex((prev) => (prev + 1) % 4);
                } else {
                    setActiveIndex((prev) => (prev + 3) % 4);
                }

                setTimeout(() => {
                    setIsAnimating(false);
                }, 650);
            }, [isAnimating]);

            const getRoleStyles = (index) => {
                const leftIndex = (activeIndex + 3) % 4;
                const rightIndex = (activeIndex + 1) % 4;
                const backIndex = (activeIndex + 2) % 4;

                const common = {
                    transition: 'transform 650ms cubic-bezier(0.4, 0, 0.2, 1), filter 650ms cubic-bezier(0.4, 0, 0.2, 1), opacity 650ms cubic-bezier(0.4, 0, 0.2, 1), left 650ms cubic-bezier(0.4, 0, 0.2, 1)',
                    willChange: 'transform, filter, opacity',
                    position: 'absolute',
                    aspectRatio: '0.6 / 1',
                };

                if (index === activeIndex) {
                    return {
                        ...common,
                        transform: `translateX(-50%) scale(${isMobile ? 1.2 : 1.55})`,
                        filter: 'blur(0px)',
                        opacity: 1,
                        zIndex: 20,
                        left: '50%',
                        height: isMobile ? '58%' : '88%',
                        bottom: isMobile ? '22%' : '0',
                    };
                } else if (index === leftIndex) {
                    return {
                        ...common,
                        transform: 'translateX(-50%) scale(0.95)',
                        filter: 'blur(3px)',
                        opacity: 0.4,
                        zIndex: 10,
                        left: isMobile ? '15%' : '28%',
                        height: isMobile ? '16%' : '28%',
                        bottom: isMobile ? '32%' : '12%',
                    };
                } else if (index === rightIndex) {
                    return {
                        ...common,
                        transform: 'translateX(-50%) scale(0.95)',
                        filter: 'blur(3px)',
                        opacity: 0.4,
                        zIndex: 10,
                        left: isMobile ? '85%' : '72%',
                        height: isMobile ? '16%' : '28%',
                        bottom: isMobile ? '32%' : '12%',
                    };
                } else {
                    return {
                        ...common,
                        transform: 'translateX(-50%) scale(0.85)',
                        filter: 'blur(6px)',
                        opacity: 0.15,
                        zIndex: 5,
                        left: '50%',
                        height: isMobile ? '13%' : '22%',
                        bottom: isMobile ? '32%' : '12%',
                    };
                }
            };

            return (
                <div 
                    className="relative w-full h-screen overflow-hidden text-white transition-colors duration-[650ms] ease-[cubic-bezier(0.4,0,0.2,1)]"
                    style={{ backgroundColor: IMAGES[activeIndex].bg }}
                >
                    {/* Grain Overlay */}
                    <div className="grain-overlay" />

                    {/* Background Ghost Text */}
                    <div className="absolute inset-x-0 flex items-center justify-center pointer-events-none select-none z-[2] top-[18%]">
                        <h1 
                            className="font-anton uppercase whitespace-nowrap opacity-[0.05]"
                            style={{ 
                                fontSize: 'clamp(90px, 28vw, 380px)', 
                                fontWeight: 900,
                                letterSpacing: '-0.02em',
                                lineHeight: 1
                            }}
                        >
                            KIKO SHAPE
                        </h1>
                    </div>

                    {/* Brand Label */}
                    <div className="absolute top-6 left-4 sm:left-8 z-[60]">
                        <span className="text-sm font-bold uppercase tracking-[0.25em] opacity-95">KIKO</span>
                    </div>

                    {/* Carousel Container */}
                    <div className="absolute inset-0 z-[3]">
                        {IMAGES.map((item, index) => (
                            <div key={index} style={getRoleStyles(index)}>
                                <img 
                                    src={item.src} 
                                    alt={`Kiko Figure ${index}`}
                                    className="w-full h-full object-contain object-bottom select-none pointer-events-none"
                                    draggable="false"
                                />
                            </div>
                        ))}
                    </div>

                    {/* Bottom Left Info & Nav */}
                    <div className="absolute bottom-6 left-4 sm:bottom-20 sm:left-24 z-[60] max-w-[340px]">
                        <p className="font-bold uppercase mb-2 sm:mb-3 text-base sm:text-[20px] tracking-[0.05em] opacity-95 leading-none">
                            KIKO TOY ARTISTRY
                        </p>
                        <p className="hidden sm:block text-xs sm:text-sm opacity-75 leading-[1.6] mb-4 sm:mb-5">
                            The cyber craftsmanship is absolute, sculpted to perfection. A visionary fusion of futuristic toys and premium design. Enter the universe of KIKO. Discover limited collectibles.
                        </p>
                        <div className="flex gap-3 sm:gap-4">
                            <button 
                                onClick={() => navigate('prev')}
                                className="w-12 h-12 sm:w-16 sm:h-16 flex items-center justify-center rounded-full border-[1.5px] border-white transition-all duration-150 hover:scale-105 hover:bg-white/10 active:scale-95 outline-none"
                                aria-label="Previous Character"
                            >
                                <ArrowLeftIcon size={isMobile ? 20 : 24} />
                            </button>
                            <button 
                                onClick={() => navigate('next')}
                                className="w-12 h-12 sm:w-16 sm:h-16 flex items-center justify-center rounded-full border-[1.5px] border-white transition-all duration-150 hover:scale-105 hover:bg-white/10 active:scale-95 outline-none"
                                aria-label="Next Character"
                            >
                                <ArrowRightIcon size={isMobile ? 20 : 24} />
                            </button>
                        </div>
                    </div>

                    {/* Discover Link */}
                    <div className="absolute bottom-6 right-4 sm:bottom-20 sm:right-10 z-[60]">
                        <a 
                            href="#"
                            className="font-anton flex items-center gap-2 sm:gap-3 group opacity-90 hover:opacity-100 transition-opacity duration-200 uppercase leading-none no-underline text-white"
                            style={{ fontSize: 'clamp(20px, 4vw, 52px)', letterSpacing: '-0.01em' }}
                        >
                            DISCOVER KIKO
                            <span className="inline-block transition-transform duration-300 group-hover:translate-x-2">
                                <ArrowRightIcon size={isMobile ? 24 : 40} />
                            </span>
                        </a>
                    </div>
                </div>
            );
        };

        // Render the application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
